<style>

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {

}
a { color: inherit; text-decoration: none; }
button { font: inherit; color: inherit; cursor: pointer; }
img, svg { display: block; max-width: 100%; }

.pill .dot { width: 6px; height: 6px; border-radius: 999px; background: var(--success); }

.card { background: var(--surface); border: 1px solid var(--line-1); border-radius: var(--r-lg); }

.bg-noise { position: absolute; inset: 0; pointer-events: none; opacity: 0.4; background-image: radial-gradient(oklch(0.85 0.01 265) 0.5px, transparent 0.5px); background-size: 6px 6px; }
.section { padding: 96px 0; position: relative; }
.section-sm { padding: 64px 0; }
.section-lg { padding: 128px 0; }
.placeholder { background: repeating-linear-gradient(135deg, oklch(0.95 0.005 265), oklch(0.95 0.005 265) 12px, oklch(0.92 0.006 265) 12px, oklch(0.92 0.006 265) 24px); border: 1px solid var(--line-2); border-radius: var(--r-md); display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); letter-spacing: 0.06em; text-transform: uppercase; }
.divider { height: 1px; background: var(--line-1); border: 0; margin: 0; }
.center-y { display: flex; align-items: center; }
.spread { display: flex; align-items: center; justify-content: space-between; }
.row { display: flex; align-items: center; gap: 12px; }
.col { display: flex; flex-direction: column; }
.gap-4 { gap: 4px; } .gap-6 { gap: 6px; } .gap-8 { gap: 8px; }
.gap-12 { gap: 12px; } .gap-16 { gap: 16px; } .gap-20 { gap: 20px; }
.gap-24 { gap: 24px; } .gap-32 { gap: 32px; }
@media (max-width: 860px) {

@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.fade-up { animation: fadeUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) both; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }

const I18nContext = createContext(null);
function I18nProvider({ children }) {
  const [lang, setLang] = useState(() => localStorage.getItem("kpz_lang") || "tr");
  useEffect(() => { localStorage.setItem("kpz_lang", lang); document.documentElement.lang = lang; }, [lang]);
  const t = STRINGS[lang];
  return <I18nContext.Provider value={{ lang, setLang, t }}>{children}</I18nContext.Provider>;
}
function useI18n() { return useContext(I18nContext); }

<script type="text/babel" data-presets="react">
const { useState: useStateNav, useEffect: useEffectNav } = React;

function Nav() {
  const { t, lang, setLang } = useI18n();
  const [scrolled, setScrolled] = useStateNav(false);
  useEffectNav(() => {
    const onScroll = () => setScrolled(window.scrollY > 8);
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);
  const links = [
    { href: "#product", label: t.nav.product },
    { href: "#integrations", label: t.nav.integrations },
    { href: "#ai", label: t.nav.ai },
    { href: "#calc", label: t.nav.pricing },
    { href: "#about", label: t.nav.about },
    { href: "#contact", label: t.nav.contact },
  ];
  return (
    <header style={{
      position: "sticky", top: 0, zIndex: 50,
      background: scrolled ? "rgba(254, 254, 252, 0.85)" : "transparent",
      backdropFilter: scrolled ? "saturate(1.4) blur(12px)" : "none",
      WebkitBackdropFilter: scrolled ? "saturate(1.4) blur(12px)" : "none",
      borderBottom: scrolled ? "1px solid var(--line-1)" : "1px solid transparent",
      transition: "background 0.2s, border-color 0.2s",
    }}>
      <div className="container spread" style={{ height: 64 }}>
        <a href="#top" aria-label="kargopazaryeri"><Wordmark /></a>
        <nav className="row hide-md" style={{ gap: 4 }}>
          {links.map(l => (
            <a key={l.href} href={l.href} style={{ padding: "8px 12px", fontSize: 14, fontWeight: 500, color: "var(--ink-2)", borderRadius: 6 }}

          ))}
        </nav>
        <div className="row" style={{ gap: 8 }}>
          <LangToggle lang={lang} setLang={setLang} />
          <a href="#dashboard" className="btn btn-ghost btn-sm hide-sm">{t.nav.login}</a>
          <a href="#contact" className="btn btn-primary btn-sm">{t.nav.signup}<Icon.Arrow /></a>
        </div>
      </div>
    </header>
  );
}

function LangToggle({ lang, setLang }) {

<script type="text/babel" data-presets="react">
const { useState: useStateC, useMemo: useMemoC } = React;

const COUNTRIES = [
  { code: "TR", name: "Türkiye", flag: "🇹🇷", origin: true },
  { code: "US", name: "Amerika", flag: "🇺🇸" },
  { code: "DE", name: "Almanya", flag: "🇩🇪" },
  { code: "GB", name: "Birleşik Krallık", flag: "🇬🇧" },
  { code: "FR", name: "Fransa", flag: "🇫🇷" },
  { code: "NL", name: "Hollanda", flag: "🇳🇱" },
  { code: "AU", name: "Avustralya", flag: "🇦🇺" },
  { code: "CA", name: "Kanada", flag: "🇨🇦" },
  { code: "JP", name: "Japonya", flag: "🇯🇵" },
  { code: "AE", name: "BAE", flag: "🇦🇪" },
];

const CARRIERS_BASE = [
  { code: "DHL", name: "DHL Express", baseRate: 4.2, baseDays: 2, color: "#FFCC00", ink: "#1f1f1f", reliability: 98 },
  { code: "FX", name: "FedEx International", baseRate: 4.8, baseDays: 3, color: "#4D148C", ink: "white", reliability: 97 },
  { code: "UPS", name: "UPS Worldwide", baseRate: 4.5, baseDays: 3, color: "#351C15", ink: "#FFB500", reliability: 96 },
  { code: "AX", name: "Aramex Global", baseRate: 3.0, baseDays: 5, color: "#E2231A", ink: "white", reliability: 92 },
  { code: "TNT", name: "TNT Express", baseRate: 4.0, baseDays: 4, color: "#FF6600", ink: "white", reliability: 94 },
  { code: "PTT", name: "PTT Yurtdışı", baseRate: 2.2, baseDays: 9, color: "#FFD400", ink: "#1f1f1f", reliability: 88 },
  { code: "USP", name: "USPS Priority", baseRate: 2.8, baseDays: 7, color: "#004B87", ink: "white", reliability: 90 },
  { code: "RM", name: "Royal Mail Int'l", baseRate: 3.2, baseDays: 6, color: "#E10A0A", ink: "white", reliability: 91 },
];

function Calculator() {
  const { t, lang } = useI18n();
  const [from] = useStateC("TR");
  const [to, setTo] = useStateC("US");
  const [weight, setWeight] = useStateC(1.5);
  const [value, setValue] = useStateC(120);
  const [type, setType] = useStateC("standard");
  const [sortBy, setSortBy] = useStateC("ai");

  const results = useMemoC(() => {
    const dist = { US: 1.0, DE: 0.55, GB: 0.65, FR: 0.5, NL: 0.5, AU: 1.4, CA: 1.05, JP: 1.2, AE: 0.7 }[to] || 1;
    const speedMul = { economy: 0.7, standard: 1.0, express: 1.45 }[type];
    const dayMul = { economy: 1.4, standard: 1.0, express: 0.55 }[type];
    return CARRIERS_BASE.map(c => {
      const price = (c.baseRate * weight * dist * speedMul + 8) * (1 + (c.reliability - 90) * 0.005);
      const days = Math.max(1, Math.round(c.baseDays * dist * dayMul));
      const score = (100 - price * 0.6) + c.reliability * 0.4 - days * 0.8;
      return { ...c, price: +price.toFixed(2), days, score: +score.toFixed(1) };
    });
  }, [to, weight, type]);

  const sorted = useMemoC(() => {
    const arr = [...results];
    if (sortBy === "price") arr.sort((a, b) => a.price - b.price);
    else if (sortBy === "speed") arr.sort((a, b) => a.days - b.days);
    else arr.sort((a, b) => b.score - a.score);
    return arr;
  }, [results, sortBy]);

  const cheapest = useMemoC(() => results.reduce((m, c) => c.price < m.price ? c : m, results[0]), [results]);
  const fastest = useMemoC(() => results.reduce((m, c) => c.days < m.days ? c : m, results[0]), [results]);
  const aiPick = sorted[0];

  return (
    <section id="calc" className="section" style={{ background: "var(--bg-2)", borderTop: "1px solid var(--line-1)", borderBottom: "1px solid var(--line-1)" }}>
      <div className="container">
        <SectionHeader eyebrow={t.calc.eyebrow} title={t.calc.title} sub={t.calc.sub} />

        <div style={{ marginTop: 56, display: "grid", gridTemplateColumns: "minmax(280px, 360px) 1fr", gap: 24, alignItems: "start" }}>
          <div className="card" style={{ padding: 24 }}>
            <div className="row" style={{ marginBottom: 18, gap: 8 }}>
              <span className="badge-ai">Canlı</span>
              <span style={{ fontSize: 12.5, color: "var(--ink-3)" }}>{lang === "tr" ? "Tahmini fiyatlar — anlık" : "Estimated rates — live"}</span>
            </div>

            <div className="col" style={{ gap: 14 }}>
              <div>
                <label className="field-label">{lang === "tr" ? "Kalkış" : "From"}</label>
                <div className="input row" style={{ gap: 10, padding: "0 12px", color: "var(--ink-2)", cursor: "not-allowed", background: "var(--bg-2)" }}>
                  <span style={{ fontSize: 18 }}>🇹🇷</span>
                  <span>Türkiye</span>
                  <span className="mono" style={{ marginLeft: "auto", fontSize: 11, color: "var(--ink-4)" }}>SABİT</span>
                </div>
              </div>

              <div>
                <label className="field-label">{lang === "tr" ? "Varış" : "To"}</label>
                <select className="select" value={to} onChange={e => setTo(e.target.value)}>
                  {COUNTRIES.filter(c => !c.origin).map(c => (<option key={c.code} value={c.code}>{c.flag} {c.name}</option>))}
                </select>
              </div>

              <div className="row" style={{ gap: 10 }}>
                <div style={{ flex: 1 }}>
                  <label className="field-label">{lang === "tr" ? "Ağırlık (kg)" : "Weight (kg)"}</label>
                  <input className="input" type="number" min="0.1" step="0.1" value={weight} onChange={e => setWeight(+e.target.value || 0.1)} />
                </div>
                <div style={{ flex: 1 }}>
                  <label className="field-label">{lang === "tr" ? "Değer ($)" : "Value ($)"}</label>
                  <input className="input" type="number" min="1" value={value} onChange={e => setValue(+e.target.value || 1)} />
                </div>
              </div>

              <div>
                <label className="field-label">{lang === "tr" ? "Hız" : "Speed"}</label>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 0, border: "1px solid var(--line-2)", borderRadius: 8, overflow: "hidden" }}>
                  {[["economy", lang === "tr" ? "Ekonomi" : "Economy"], ["standard", lang === "tr" ? "Standart" : "Standard"], ["express", "Express"]].map(([k, l]) => (
                    <button key={k} onClick={() => setType(k)} style={{
                      height: 38, border: 0,
                      background: type === k ? "var(--ink-1)" : "var(--surface)",
                      color: type === k ? "var(--bg)" : "var(--ink-2)",
                      fontWeight: type === k ? 600 : 500, fontSize: 13.5,
                    }}>{l}</button>
                  ))}
                </div>
              </div>

              <div style={{ height: 1, background: "var(--line-1)", margin: "8px 0" }}/>

              <div className="card-soft" style={{ padding: 14, background: "var(--accent-soft)", border: "1px solid oklch(0.85 0.06 268)" }}>
                <div className="row" style={{ gap: 8, marginBottom: 8 }}>
                  <span className="badge-ai">AI</span>
                  <span style={{ fontSize: 13, fontWeight: 600, color: "var(--accent-ink)" }}>{lang === "tr" ? "Önerimiz" : "Our pick"}: {aiPick.name}</span>
                </div>
                <p style={{ margin: 0, fontSize: 12.5, color: "var(--ink-2)", lineHeight: 1.5 }}>
                  {lang === "tr"
                    ? `${value}$ değerinde ${weight}kg paket için fiyat/süre/güvenilirlik dengesinde en iyi seçim. Tahmini teslim: ${aiPick.days} gün.`
                    : `Best balance of price/speed/reliability for a ${weight}kg parcel valued at $${value}. ETA: ${aiPick.days} days.`}
                </p>
              </div>
            </div>
          </div>

          <div className="card" style={{ overflow: "hidden" }}>
            <div className="spread" style={{ padding: "16px 20px", borderBottom: "1px solid var(--line-1)" }}>
              <div className="row" style={{ gap: 16 }}>
                <Stat label={lang === "tr" ? "En ucuz" : "Cheapest"} value={`$${cheapest.price.toFixed(2)}`} sub={cheapest.name} />
                <Stat label={lang === "tr" ? "En hızlı" : "Fastest"} value={`${fastest.days} ${lang === "tr" ? "gün" : "days"}`} sub={fastest.name} />
                <Stat label={lang === "tr" ? "Sonuç" : "Results"} value={`${results.length}`} sub={lang === "tr" ? "taşıyıcı" : "carriers"} />
              </div>
              <div className="row" style={{ gap: 4, padding: 2, background: "var(--bg-2)", borderRadius: 8, border: "1px solid var(--line-2)" }}>
                {[["ai", "AI"], ["price", lang === "tr" ? "Fiyat" : "Price"], ["speed", lang === "tr" ? "Hız" : "Speed"]].map(([k, l]) => (
                  <button key={k} onClick={() => setSortBy(k)} style={{
                    height: 26, padding: "0 12px", borderRadius: 6, border: 0,
                    fontSize: 12, fontWeight: 600,
                    background: sortBy === k ? "var(--ink-1)" : "transparent",
                    color: sortBy === k ? "var(--bg)" : "var(--ink-2)",
                  }}>{l}</button>
                ))}
              </div>
            </div>

            <div>
              {sorted.map((c, i) => (<CarrierRow key={c.code} c={c} isAI={c.code === aiPick.code && sortBy === "ai"} idx={i} />))}
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

function Stat({ label, value, sub }) {
  return (
    <div className="col" style={{ gap: 1 }}>
      <span className="mono" style={{ fontSize: 10, letterSpacing: "0.08em", textTransform: "uppercase", color: "var(--ink-4)" }}>{label}</span>
      <span style={{ fontFamily: "var(--font-display)", fontSize: 18, fontWeight: 600, letterSpacing: "-0.01em" }}>{value}</span>
      <span style={{ fontSize: 11, color: "var(--ink-3)" }}>{sub}</span>
    </div>
  );
}

function CarrierRow({ c, isAI, idx }) {
  const { lang } = useI18n();
  return (
    <div className="row" style={{
      padding: "16px 20px", borderBottom: "1px solid var(--line-1)",
      background: isAI ? "linear-gradient(to right, var(--accent-soft), transparent)" : "transparent",
      transition: "background 0.15s",
    }}>
      <div className="row" style={{ gap: 12, flex: "0 0 auto", width: 200 }}>
        <span style={{ width: 36, height: 36, borderRadius: 8, background: c.color, color: c.ink, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "var(--font-mono)", fontSize: 10, fontWeight: 700, letterSpacing: "0.02em" }}>{c.code}</span>
        <div className="col" style={{ gap: 2 }}>
          <span style={{ fontSize: 14, fontWeight: 600 }}>{c.name}</span>
          <span style={{ fontSize: 11.5, color: "var(--ink-3)" }}>{c.reliability}% {lang === "tr" ? "güvenilirlik" : "reliability"}</span>
        </div>
      </div>
      <div style={{ flex: 1 }}>
        <div className="row" style={{ gap: 8 }}>
          <span style={{ fontSize: 14, fontWeight: 500 }}>{c.days} {lang === "tr" ? "gün" : "days"}</span>
          <DaysBar days={c.days} />
        </div>
      </div>
      <div className="row" style={{ gap: 8, flex: "0 0 auto" }}>
        {isAI && <span className="badge-ai">AI ÖNERİ</span>}
        <span className="mono" style={{ fontFamily: "var(--font-display)", fontSize: 18, fontWeight: 600, minWidth: 70, textAlign: "right" }}>${c.price.toFixed(2)}</span>
        <button className="btn btn-sm" style={{ background: isAI ? "var(--accent)" : "var(--ink-1)", color: "white" }}>{lang === "tr" ? "Seç" : "Select"}</button>
      </div>
    </div>
  );
}

function DaysBar({ days }) {
  const max = 12;
  const pct = Math.min(1, days / max);
  return (
    <div style={{ flex: 1, maxWidth: 120, height: 4, borderRadius: 999, background: "var(--line-1)", position: "relative", overflow: "hidden" }}>
      <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: `${pct * 100}%`, background: pct < 0.3 ? "var(--success)" : pct < 0.6 ? "var(--accent)" : "var(--ink-3)", borderRadius: 999 }} />
    </div>
  );
}

Object.assign(window, { Calculator });
</script>

<script type="text/babel" data-presets="react">
const { useState: useStateAI, useEffect: useEffectAI } = React;

function AISection() {
  const { t, lang } = useI18n();
  const modules = [
    { code: "ROUTE", name: lang === "tr" ? "Rota optimizasyonu" : "Route optimization", desc: lang === "tr" ? "12M gönderiden öğrenen graf modeli; gerçek zamanlı transit verisi ile ETA tahmini." : "Graph model trained on 12M shipments; ETA prediction with real-time transit data.", acc: "94.2%" },
    { code: "PRICE", name: lang === "tr" ? "Dinamik fiyatlandırma" : "Dynamic pricing", desc: lang === "tr" ? "Kur, sezon ve hacim faktörlerini işleyen ML; her 15 dk yeniden eğitim." : "ML processing FX, seasonality, volume; retrained every 15 min.", acc: "91.6%" },
    { code: "HSCODE", name: lang === "tr" ? "HS kod tahmini" : "HS code prediction", desc: lang === "tr" ? "Ürün başlık + açıklamadan 6 haneli gümrük kodu; 180+ ülke uyumlu." : "6-digit HS code from product title + description; 180+ countries.", acc: "96.8%" },
    { code: "ADDR", name: lang === "tr" ? "Adres doğrulama" : "Address validation", desc: lang === "tr" ? "Tutarsız uluslararası adresleri normalize eder; teslim başarısı +%23." : "Normalizes inconsistent international addresses; +23% delivery success.", acc: "98.1%" },
    { code: "CAT", name: lang === "tr" ? "Kategori sınıflandırma" : "Category classification", desc: lang === "tr" ? "Etsy/Shopify ürünlerini kargo kategorilerine eşler." : "Maps Etsy/Shopify products to shipping categories.", acc: "93.4%" },
    { code: "RETURN", name: lang === "tr" ? "İade tahmini" : "Returns forecasting", desc: lang === "tr" ? "Sipariş başında iade olasılığı; sigorta önerisi tetikler." : "Predicts return likelihood at order time; triggers insurance suggestion.", acc: "87.9%" },
    { code: "CUST", name: lang === "tr" ? "Gümrük kuralı motoru" : "Customs rules engine", desc: lang === "tr" ? "Ülkeden ülkeye değişen istisnaları yönetir; 14k kural setiyle eğitildi." : "Handles country-by-country exceptions; trained on 14k rule set.", acc: "92.0%" },
  ];
  return (
    <section id="ai" className="section" style={{ background: "var(--ink-1)", color: "var(--bg)", position: "relative", overflow: "hidden" }}>
      <div style={{
        position: "absolute", inset: 0,
        backgroundImage: "linear-gradient(to right, rgba(255,255,255,0.04) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.04) 1px, transparent 1px)",
        backgroundSize: "64px 64px",
        maskImage: "radial-gradient(ellipse 80% 80% at 30% 50%, black 30%, transparent 75%)",
        WebkitMaskImage: "radial-gradient(ellipse 80% 80% at 30% 50%, black 30%, transparent 75%)",
      }}/>
      <div style={{ position: "absolute", top: -100, right: -100, width: 600, height: 600, borderRadius: "50%", background: "radial-gradient(circle, oklch(0.55 0.18 268 / 0.4), transparent 60%)" }}/>

      <div className="container" style={{ position: "relative", zIndex: 1 }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 48, alignItems: "start" }}>
          <div className="col" style={{ gap: 16, maxWidth: 540 }}>
            <div className="eyebrow" style={{ color: "oklch(0.78 0.10 268)" }}>{t.ai.eyebrow}</div>
            <h2 className="h-1" style={{ margin: 0, color: "var(--bg)" }}>
              {t.ai.title.split("\n").map((l, i) => (<React.Fragment key={i}>{l}{i < 1 && <br/>}</React.Fragment>))}
            </h2>
            <p className="lede" style={{ margin: 0, color: "oklch(0.78 0.01 265)" }}>{t.ai.sub}</p>

          <div className="col" style={{ gap: 8 }}>
            <div className="row" style={{ justifyContent: "space-between", padding: "0 4px 8px", borderBottom: "1px solid rgba(255,255,255,0.1)" }}>

              <span className="mono" style={{ fontSize: 10.5, letterSpacing: "0.08em", textTransform: "uppercase", color: "oklch(0.65 0.01 265)" }}>{lang === "tr" ? "Doğruluk" : "Accuracy"}</span>
            </div>
            {modules.map((m, i) => (<AIModuleRow key={m.code} m={m} delay={i * 0.06} />))}
          </div>
        </div>
      </div>
    </section>
  );
}

function AIModuleRow({ m, delay }) {
  return (
    <div className="row fade-up" style={{
      padding: "16px 14px", borderRadius: 10,
      border: "1px solid rgba(255,255,255,0.08)",
      background: "rgba(255,255,255,0.025)",
      gap: 14, animationDelay: `${delay}s`,
    }}>
      <span className="mono" style={{
        fontSize: 10, fontWeight: 600, letterSpacing: "0.06em",
        padding: "3px 7px", borderRadius: 4,
        background: "var(--accent)", color: "white", flex: "0 0 auto",
      }}>{m.code}</span>
      <div className="col" style={{ flex: 1, gap: 2 }}>
        <span style={{ fontSize: 14, fontWeight: 600, color: "var(--bg)" }}>{m.name}</span>
        <span style={{ fontSize: 12.5, color: "oklch(0.72 0.008 265)", lineHeight: 1.4 }}>{m.desc}</span>
      </div>
      <span className="mono" style={{ fontFamily: "var(--font-display)", fontSize: 18, fontWeight: 600, color: "oklch(0.85 0.10 268)", flex: "0 0 auto" }}>{m.acc}</span>
    </div>
  );
}

function RouteMap() {
  const [phase, setPhase] = useStateAI(0);
  useEffectAI(() => {
    const i = setInterval(() => setPhase(p => (p + 1) % 4), 1800);
    return () => clearInterval(i);
  }, []);

  const POINTS = {
    IST: { x: 470, y: 145, label: "Istanbul" },
    LON: { x: 380, y: 110, label: "London" },
    NYC: { x: 200, y: 145, label: "New York" },
    DUB: { x: 530, y: 195, label: "Dubai" },
    SYD: { x: 770, y: 280, label: "Sydney" },
  };
  const ROUTES = [
    { from: "IST", to: "NYC", color: "var(--accent-2)" },
    { from: "IST", to: "LON", color: "oklch(0.78 0.10 268)" },
    { from: "IST", to: "DUB", color: "oklch(0.85 0.14 268)" },
    { from: "IST", to: "SYD", color: "oklch(0.7 0.16 268)" },
  ];

  return (
    <div style={{ marginTop: 16, padding: 20, borderRadius: 14, border: "1px solid rgba(255,255,255,0.1)", background: "rgba(255,255,255,0.03)" }}>
      <div className="row" style={{ marginBottom: 12, gap: 8 }}>
        <span className="badge-ai" style={{ background: "rgba(139, 124, 220, 0.2)", color: "oklch(0.85 0.10 268)" }}>ROUTE</span>
        <span className="mono" style={{ fontSize: 11, color: "oklch(0.65 0.01 265)" }}>route_optimizer.predict() — live</span>
      </div>
      <svg viewBox="0 0 880 360" style={{ width: "100%", height: "auto" }}>
        <defs>
          <pattern id="dots" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
            <circle cx="1" cy="1" r="0.7" fill="rgba(255,255,255,0.15)"/>
          </pattern>
        </defs>
        <g opacity="0.6">
          <path d="M 100,80 Q 180,60 260,80 L 280,170 Q 200,210 130,200 L 100,80 Z" fill="url(#dots)"/>
          <path d="M 350,70 Q 460,55 540,80 L 600,180 Q 480,210 360,180 L 350,70 Z" fill="url(#dots)"/>
          <path d="M 540,100 Q 640,90 720,140 L 700,210 Q 620,220 540,180 L 540,100 Z" fill="url(#dots)"/>
          <path d="M 720,240 Q 800,230 830,270 L 810,310 Q 750,320 720,290 L 720,240 Z" fill="url(#dots)"/>
        </g>
                {ROUTES.map((r, i) => {
          const a = POINTS[r.from], b = POINTS[r.to];
          const cx = (a.x + b.x) / 2, cy = Math.min(a.y, b.y) - 60;
          const path = `M ${a.x},${a.y} Q ${cx},${cy} ${b.x},${b.y}`;
          const isActive = phase === i;
          return (
            <g key={i}>
              <path d={path} stroke={r.color} strokeWidth={isActive ? 2 : 1} fill="none"
                strokeDasharray={isActive ? "0" : "4 4"} opacity={isActive ? 1 : 0.4}
                style={{ transition: "all 0.6s" }} />
              {isActive && (<circle r="4" fill={r.color}><animateMotion dur="1.6s" repeatCount="1" path={path} /></circle>)}
            </g>
          );
        })}

        {Object.entries(POINTS).map(([k, p]) => (
          <g key={k}>
            <circle cx={p.x} cy={p.y} r="6" fill="var(--accent)" stroke="var(--ink-1)" strokeWidth="2"/>
            <circle cx={p.x} cy={p.y} r="12" fill="var(--accent)" opacity="0.2" className={k === "IST" ? "pulse" : ""}/>
            <text x={p.x} y={p.y - 14} fill="var(--bg)" fontSize="11" fontFamily="var(--font-mono)" textAnchor="middle">{p.label}</text>
          </g>
        ))}
      </svg>
      <div className="row" style={{ marginTop: 8, justifyContent: "space-between", padding: "0 4px" }}>
        <span className="mono" style={{ fontSize: 11, color: "oklch(0.65 0.01 265)" }}>4 {phase === 0 ? "rotalar değerleniyor" : "active routes"}</span>
        <span className="mono" style={{ fontSize: 11, color: "oklch(0.85 0.10 268)" }}>↗ ETA -18%</span>
      </div>
    </div>
  );
}

Object.assign(window, { AISection });
</script>

          <FooterCol title={t.footer.company} items={[["#about", lang === "tr" ? "Hakkımızda" : "About"], ["#contact", lang === "tr" ? "İletişim" : "Contact"], ["#about", lang === "tr" ? "Kariyer" : "Careers"], ["#about", lang === "tr" ? "Basın" : "Press"]]}/>
          <FooterCol title={t.footer.legal} items={[["#", lang === "tr" ? "Gizlilik" : "Privacy"], ["#", lang === "tr" ? "Şartlar" : "Terms"], ["#", "KVKK"], ["#", "Cookies"]]}/>
        </div>

        <div className="spread" style={{ marginTop: 48, paddingTop: 24, borderTop: "1px solid var(--line-1)" }}>
          <span className="mono" style={{ fontSize: 11.5, color: "var(--ink-3)" }}>{t.footer.copyright}</span>
          <span className="mono" style={{ fontSize: 11, color: "var(--ink-4)" }}>v0.9.4-beta · Build 2026.05.02</span>
        </div>
      </div>
    </footer>
  );
}

function FooterCol({ title, items }) {
  return (
    <div className="col" style={{ gap: 10 }}>
      <div className="mono" style={{ fontSize: 11, color: "var(--ink-3)", letterSpacing: "0.08em", textTransform: "uppercase" }}>{title}</div>
      {items.map(([h, l]) => (<a key={l} href={h} style={{ fontSize: 13.5, color: "var(--ink-2)" }}>{l}</a>))}
    </div>
  );
}

Object.assign(window, { About, Contact, CTABand, Footer });
</script>
